<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenLoom — Allow Access</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #18181b;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      text-align: center;
      padding: 2rem;
      max-width: 360px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #71717a; margin-bottom: 1.5rem; }
    .status { font-size: 0.875rem; color: #a1a1aa; }
    .granted { color: #34d399; }
    .denied { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OpenLoom needs access</h1>
    <p>Please allow camera and microphone access when prompted.</p>
    <div id="status" class="status">Requesting access...</div>
  </div>
  <script type="module" src="./permissions.ts"></script>
</body>
</html>
